databases:
  - name: adhd-db
    plan: free
    databaseName: adhd_platform
    user: adhd_user

services:
  - type: web
    name: adhd-platform
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: adhd-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
