services:
  - type: web
    name: adhd-platform
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DB_PATH
        value: /app/data/adhd_platform.db
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: adhd-db
      mountPath: /app/data
      sizeGB: 1
